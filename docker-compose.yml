version: "3.9"

services:
  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: stockify_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: inventory
    volumes:
      - mongo_data:/data/db
    networks:
      - stockify_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Node / Express) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockify_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGODB_URL: mongodb://mongo:27017/inventory
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "5000:5000"
    networks:
      - stockify_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/auth/health", "||", "exit", "0"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend (React → Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:5000}
    container_name: stockify_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - stockify_net

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    name: stockify_mongo_data

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  stockify_net:
    name: stockify_network
    driver: bridge
